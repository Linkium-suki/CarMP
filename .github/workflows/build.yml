name: Build & Release APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install Gradle 8.5
        run: |
          curl -sSLO https://services.gradle.org/distributions/gradle-8.5-bin.zip
          sudo unzip -q -d /opt/gradle gradle-8.5-bin.zip
          echo "/opt/gradle/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5 --no-daemon

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-unsigned

      - name: Rename APK
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          mv app-release-unsigned.apk "MusicPlayer-${TAG_NAME}.apk"
          echo "APK=MusicPlayer-${TAG_NAME}.apk" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MusicPlayer ${{ github.ref_name }}"
          body: |
            ## 🎵 MusicPlayer ${{ github.ref_name }}

            Lightweight audio/video player for Android 4.0+ (API 14).
            Full ID3 tag support (v1, v2.2, v2.3, v2.4).

            ### Features
            - ✅ Full ID3 tag parsing with album art extraction
            - ✅ Audio & video playback
            - ✅ Background music service with notification
            - ✅ Playlist with shuffle & repeat
            - ✅ Clean Material Design green theme
            - ✅ Minimal APK size (zero external deps)
            - ✅ Android 4.0 (API 14) or higher

            ### Requirements
            - Android 4.0 (Ice Cream Sandwich) or higher
            - Storage permission for media scanning

            > ⚠️ This APK is **unsigned**. For production use, sign with your own keystore.
          draft: false
          prerelease: false
          files: |
            ${{ env.APK }}
