name: Build & Release APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-release-unsigned

      - name: Rename APK
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          mv app-release-unsigned.apk "MusicPlayer-${TAG_NAME}.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MusicPlayer ${{ github.ref_name }}"
          body: |
            ## MusicPlayer ${{ github.ref_name }}

            Lightweight audio/video player for Android 4.0+ (API 14).
            Full ID3 tag support (v1, v2.2, v2.3, v2.4).

            ### Features
            - Full ID3 tag parsing with album art extraction
            - Audio & video playback
            - Background music service
            - Playlist with shuffle & repeat
            - Clean Material Design UI
            - Minimal APK size

            ### Requirements
            - Android 4.0 (API 14) or higher
            - Storage permission for media scanning

            > **Note:** This APK is unsigned. For production use, sign with your own keystore.
          draft: false
          prerelease: false
          files: |
            MusicPlayer-*.apk
